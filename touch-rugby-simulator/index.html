<!DOCTYPE html>
<html>
 <head>
 <title>Touch Rugby Simulator</title>
 <style>
 body{
	display: flex;
	justify-content: center;
	}
 svg{user-select:none;}
 </style>
 </head>

 <body>
<div>
	<button id="btnDrag">Drag</button>
	<button id="btnArrow">Arrow</button>
	<button id="btnPass">Pass</button>
</div>
 <svg width="490" height="700">

<!-- Pitch background -->
   <rect x="50" y="0" width="390" height="700" fill="green"/>



<!-- Sub boxes -->
   <rect x="0" y="300" width="50" height="100" fill="grey"stroke="black" stroke-width="2"/>
   <rect x="440" y="300" width="50" height="100" fill="grey" stroke="black" stroke-width="2"/>

<!-- Pitch lines -->
   <line x1="50" y1="350" x2="440" y2="350" stroke="white" stroke-width="2"/>
   <line x1="50" y1="100" x2="440" y2="100" stroke="white" stroke-width="2"/>   
   <line x1="50" y1="600" x2="440" y2="600" stroke="white" stroke-width="2"/>


<!-- Player Defence -->
<g id="D1" transform="translate(85, 300)">
<circle cx="0" cy="0" r="12" fill="blue"/>
<text x="0" y="5" text-anchor="middle" font-size="16" fill="white">W</text>
</g>
<g id="D2" transform="translate(150, 300)">
<circle cx="0" cy="0" r="12" fill="blue"/>
<text x="0" y="5" text-anchor="middle" font-size="16" fill="white">L</text>
</g>
<g id="D3" transform="translate(215, 300)">
<circle cx="0" cy="0" r="12" fill="blue"/>
<text x="0" y="5" text-anchor="middle" font-size="16" fill="white">M</text>
</g>
<g id="D4" transform="translate(280, 300)">
<circle cx="0" cy="0" r="12" fill="blue"/>

</g>
<g id="D5" transform="translate(345, 300)">
<circle cx="0" cy="0" r="12" fill="blue"/>
<text x="0" y="5" text-anchor="middle" font-size="16" fill="white">L</text>
</g>
<g id="D6" transform="translate(410, 300)">
<circle cx="0" cy="0" r="12" fill="blue"/>
<text x="0" y="5" text-anchor="middle" font-size="16" fill="white">W</text>
</g>

<!-- Player Attack -->
<g id="A1" transform="translate(85, 400)">
<circle cx="0" cy="0" r="12" fill="red"/>
<text x="0" y="5" text-anchor="middle" font-size="16" fill="white">W</text>
</g>
<g id="A2" transform="translate(150, 400)">
<circle cx="0" cy="0" r="12" fill="red"/>

<g id="A3" transform="translate(215, 400)">
<circle cx="0" cy="0" r="12" fill="red"/>
<text x="0" y="5" text-anchor="middle" font-size="16" fill="white">M</text>
</g>
<g id="A4" transform="translate(280, 400)">
<circle cx="0" cy="0" r="12" fill="red"/>
<text x="0" y="5" text-anchor="middle" font-size="16" fill="white">M</text>
</g>
<g id="A5" transform="translate(345, 400)">
<circle cx="0" cy="0" r="12" fill="red"/>

</g>

 </svg>
 <script src="script.js"></script>
 </body>
</html>
